services:
  # Redis для Django Channels (WebSockets)
  redis:
    image: redis:7-alpine
    container_name: schedule_redis
    ports:
      - "6380:6379"

  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: schedule_backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DEBUG=1
      - REDIS_URL=redis://redis:6379/1
      - PYTHONPATH=/app
      # Используем Ollama на хосте (доступ через host.docker.internal)
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL_NAME=qwen3.5:9b
    depends_on:
      - redis
    # Используем daphne для HTTP + WebSocket
    command: sh -c "python manage.py migrate && daphne -b 0.0.0.0 -p 8000 backend.asgi:application"

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: schedule_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "4028:4028"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
